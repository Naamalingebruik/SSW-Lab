name: SSW Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Scope CurrentUser -Force

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run quality checks
        shell: pwsh
        run: ./build/Invoke-QualityChecks.ps1
        working-directory: D:/a/SSW-Lab/SSW-Lab
